# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

# Files we don't own and shouldn't lint
AllCops:
  Exclude:
    - "db/schema.rb"           # auto-generated by migrations
    - "db/migrate/**/*"        # migration files have their own conventions
    - "bin/**/*"               # Rails binstubs
    - "node_modules/**/*"
    - "vendor/**/*"

# Overwrite or add rules to create your own house style
#
# # Use `[a, [b, c]]` not `[ a, [ b, c ] ]`
# Layout/SpaceInsideArrayLiteralBrackets:
#   Enabled: false